name: Publish to npm

on:
  push:
    tags:
      - "v*" # e.g. v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for npm provenance / trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # node 24 ships npm 11+, required for oidc trusted publishing with the registry
      # omit registry-url so setup-node does not write _authToken into .npmrc (that blocks oidc)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # trusted publisher on npm must list this workflow file: publish-npm.yml (no NODE_AUTH_TOKEN)
      - name: Publish
        run: npm publish --provenance --access public
