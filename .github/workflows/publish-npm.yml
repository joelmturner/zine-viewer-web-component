name: Publish to npm

on:
  push:
    tags:
      - "v*" # e.g. v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for npm provenance / trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          # If you're using an npm automation token:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # If you're using trusted publishing, npm will use the OIDC token automatically.
